name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # Windows dahil tam matrisi elle tetiklemek için

permissions:
  contents: read

jobs:
  test:
    name: Run Tests and Linters
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PR'larda sadece ubuntu; main'e push ve elle tetiklemede windows da koşar.
        # Windows dakikaları 2x çarpanla faturalanıyor — Actions kotasının çoğunu o yiyordu.
        # Windows'a özgü hatalar (path ayracı, cp1252 encoding, açık dosya silinemez) merge anında yakalanır.
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
        python-version: ["3.10"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Unit Tests (Exclude Slow/Model Tests)
        run: pytest -m "not slow"
