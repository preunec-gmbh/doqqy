name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests and Linters
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # pip install -e .[dev] bazı kabuklarda tırnak gerektirebilir, o yüzden tırnaklıyoruz ve ruff/pytest'i garantiye alıyoruz
          pip install -e ".[dev]" || (pip install -e . && pip install ruff pytest)

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Unit Tests (Exclude Slow/Model Tests)
        run: pytest -m "not slow"

